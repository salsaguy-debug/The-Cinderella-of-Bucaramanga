<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Sol La Reina de Bucaramanga</title>
  
  <link rel="icon" type="image/png" href="img/favicon.png?v=3" sizes="16x16">
  <link rel="apple-touch-icon" href="img/logo.png?v=3">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" sizes="192x192" href="img/logo.png?v=3">
  <link rel="icon" sizes="512x512" href="img/logo.png?v=3">
  <meta name="theme-color" content="#ff8c00">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div id="intro-overlay" class="overlay">
    <img src="img/logo.png" alt="Logo" class="scaled-logo">
    <div class="intro-box">
      <h2>Mi Sol La Reina de Bucaramanga</h2>
      <div class="instructions">
        <p>🎴 <b>FLIP:</b> Click a card to reveal a memory.</p>
        <p>✨ <b>MATCH:</b> Find the pair to clear the board.</p>
        <p>🏆 <b>WIN:</b> Complete the full grid to celebrate!</p>
      </div>
      <p id="timer-text">Preparing the magic in: <b id="count-num">5</b></p>
      <button id="start-btn" class="btn-orange" style="display:none;">Enter the Magic</button>
    </div>
  </div>

  <div class="game-header">
    <h1>Mi Sol La Reina de Bucaramanga</h1>
    <div class="stats-container">
      <div class="score-box">Moves: <span id="move-counter">0</span></div>
      <div class="score-box best-score">Best: <span id="best-score">--</span></div>
      <button class="btn-orange" onclick="toggleAudioModal()">Audio</button>
      <button id="new-game-btn" class="btn-orange">New Game</button>
    </div>
  </div>

  <div id="audio-modal" class="overlay" style="display: none;">
    <div class="modal-content">
      <h3>Audio Settings</h3>
      <div class="volume-control-group">
        <div class="slider-item">
          <label>Background Music</label>
          <input type="range" id="bg-music-slider" min="0" max="1" step="0.1" value="0.5">
        </div>
        <div class="slider-item">
          <label>Sound Effects (SFX)</label>
          <input type="range" id="sfx-slider" min="0" max="1" step="0.1" value="0.5">
        </div>
      </div>
      <button id="mute-btn" class="btn-orange" onclick="toggleMute()">Mute: OFF</button>
      <button class="btn-close" onclick="toggleAudioModal()">Close</button>
    </div>
  </div>

  <div id="win-modal" class="overlay" style="display: none;">
    <div class="win-card">
      <h2>¡Felicidades!</h2>
      
      <video id="win-video" playsinline preload="auto"></video>
      
      <button id="play-again-btn" class="btn-orange">Play Again</button>
    </div>
  </div>

  <section class="memory-game" id="game-board"></section>

  <audio id="bg-music" src="audio/bg_music.mp3" loop></audio>
  <audio id="sound-flip" src="audio/flip.mp3"></audio>
  <audio id="sound-match" src="audio/match.mp3"></audio>
  <audio id="sound-mismatch" src="audio/mismatch.mp3"></audio>

  <script src="scripts.js"></script>
</body>
</html>
